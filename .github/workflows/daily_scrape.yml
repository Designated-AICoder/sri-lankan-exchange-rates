name: Daily FX Rate Update

on:
  schedule:
    # Run at 04:00 UTC (09:30 AM Sri Lanka Time) daily
    - cron: '0 4 * * *'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        run: python main.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Data: Automated daily FX rate update [skip ci]"
          file_pattern: 'data/fxrates_master.csv'
